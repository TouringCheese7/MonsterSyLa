name: MonsterSyLa Cron

on:
  schedule:
    # Domingo 5:00 PM México
    - cron: '0 23 * * 0'

    # Lunes 6:00 AM México
    - cron: '0 12 * * 1'

  workflow_dispatch:
    inputs:
      modo:
        description: 'Selecciona modo'
        required: true
        type: choice
        options:
          - domingo
          - lunes

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CR_API_KEY: ${{ secrets.CR_API_KEY }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Auto Domingo
        if: github.event.schedule == '0 23 * * 0'
        run: node scripts/syncClans.js domingo

      - name: Auto Lunes
        if: github.event.schedule == '0 12 * * 1'
        run: node scripts/syncClans.js lunes

      - name: Manual
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/syncClans.js ${{ github.event.inputs.modo }}
